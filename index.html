<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Creator Toolkit Pro | By Samir LC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg-dark: #0f0c29;
            --card-dark: rgba(255, 255, 255, 0.08);
            --text-dark: #ffffff;
            --bg-light: #f8f9fa;
            --card-light: #ffffff;
            --text-light: #2d3436;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }

        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-attachment: fixed;
            transition: background 0.4s, color 0.4s;
            color: var(--text-dark);
            min-height: 100vh;
        }

        body.light-mode {
            background: var(--bg-light);
            color: var(--text-light);
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 10%; background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px); z-index: 1000;
            border-bottom: 1px solid rgba(0, 210, 255, 0.3);
        }

        body.light-mode nav { background: rgba(255, 255, 255, 0.9); border-bottom: 1px solid #ddd; }

        .logo { font-size: 22px; font-weight: 800; color: var(--primary); text-transform: uppercase; }

        nav ul { display: flex; list-style: none; align-items: center; }
        nav ul li { margin-left: 25px; }
        nav ul li a { color: white; text-decoration: none; font-size: 14px; font-weight: 600; transition: 0.3s; }
        body.light-mode nav ul li a { color: #333; }
        nav ul li a:hover { color: var(--primary); }

        .theme-toggle { cursor: pointer; font-size: 20px; color: var(--primary); margin-left: 20px; }

        /* Container & Glass Cards */
        section { min-height: 100vh; padding: 120px 10% 60px; display: flex; align-items: center; justify-content: center; flex-direction: column; }

        .glass-card {
            background: var(--card-dark);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%; max-width: 850px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        body.light-mode .glass-card { background: var(--card-light); border: 1px solid #eee; color: #333; }

        /* UI Elements */
        .tool-header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }

        input {
            width: 100%; padding: 18px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
            color: inherit; font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        body.light-mode input { background: #f1f3f5; border: 1px solid #ddd; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,210,255,0.3); }

        .btn-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        .tool-btn {
            padding: 14px 28px; border: none; border-radius: 50px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white; font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 10px;
        }
        .tool-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,210,255,0.4); }

        /* Loader & Results */
        #loader { display: none; text-align: center; margin: 25px 0; font-weight: 600; color: var(--primary); }
        .spinner { animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #result-box {
            margin-top: 25px; padding: 25px; background: rgba(0,0,0,0.3);
            border-radius: 15px; border-left: 5px solid
