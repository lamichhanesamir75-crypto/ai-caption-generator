<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Creator Tools</title>

<style>

body{
font-family: Arial;
background:#f2f4f8;
margin:0;
text-align:center;
}

header{
background:#111;
color:white;
padding:20px;
font-size:24px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
width:80%;
padding:12px;
margin:10px;
border:1px solid #ddd;
border-radius:5px;
}

button{
padding:12px 25px;
border:none;
background:#007BFF;
color:white;
border-radius:5px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0056b3;
}

#result{
margin-top:20px;
white-space:pre-line;
font-size:16px;
}

.tools{
margin-top:20px;
}

</style>

</head>

<body>

<header>
AI Creator Tools
</header>

<div class="container">

<h3>Enter Your Topic</h3>

<input id="topic" placeholder="Example: Motivation for students">

<div class="tools">

<button onclick="youtube()">YouTube Titles</button>
<button onclick="caption()">Instagram Caption</button>
<button onclick="hashtags()">Hashtags</button>

</div>

<div id="result"></div>

</div>

<script>

function youtube(){

let topic=document.getElementById("topic").value;

let titles=[
"10 Powerful Tips About "+topic,
"The Truth About "+topic,
"How To Master "+topic+" Fast",
"Secrets Nobody Tells About "+topic,
topic+" Explained in 5 Minutes"
];

document.getElementById("result").innerText=titles.join("\n");

}

function caption(){

let topic=document.getElementById("topic").value;

let captions=[
"Living my best life with "+topic+" ✨",
topic+" vibes only 🔥",
"Another beautiful moment with "+topic,
"Can't get enough of "+topic+" ❤️"
];

document.getElementById("result").innerText=captions.join("\n");

}

function hashtags(){

let topic=document.getElementById("topic").value;

let tags=[
"#"+topic.replace(" ",""),
"#success",
"#motivation",
"#viral",
"#contentcreator",
"#instagramgrowth",
"#creatorlife"
];

document.getElementById("result").innerText=tags.join(" ");

}

</script>

</body>
</html>
