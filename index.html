<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir AI Toolkit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f0c29; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 30px; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; cursor: pointer; font-weight: bold; }
        #result-box { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; display: none; text-align: left; line-height: 1.6; }
        #loader { display: none; margin-top: 15px; color: var(--primary); }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: var(--primary)">Samir's AI Toolkit</h2>
        <input type="text" id="topic" placeholder="Topic lekhnuhos (e.g. Stock Market)...">
        <div class="btn-group">
            <button class="btn" onclick="askAI('YouTube Titles')">Titles</button>
            <button class="btn" onclick="askAI('Instagram Captions')">Captions</button>
            <button class="btn" onclick="askAI('Viral Tags')">Hashtags</button>
        </div>
        <div id="loader"><i class="fas fa-spinner fa-spin"></i> AI is thinking...</div>
        <div id="result-box"></div>
    </div>

    <script>
        async function askAI(type) {
            const topic = document.getElementById('topic').value;
            // Timro naya API Key
            const apiKey = "AIzaSyDFTZmZX_aytRg8KTg56c_zbtoNbA-ISUs"

            if(!topic) { alert("Topic ta lekhnus!"); return; }

            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('result-box');
            
            loader.style.display = "block";
            resultBox.style.display = "none";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Generate 5 viral ${type} for: ${topic}` }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                resultBox.innerHTML = aiResponse.replace(/\n/g, "<br>");
                resultBox.style.display = "block";
            } catch (err) {
                resultBox.innerHTML = "Error: Key expire bhayo ki check garnus.";
                resultBox.style.display = "block";
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
